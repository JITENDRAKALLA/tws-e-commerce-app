apiVersion: v1
kind: LimitRange
metadata:
  name: easyshop-limitrange
  namespace: easyshop
spec:
  limits:
  - type: Container
    default:
      cpu: "300m"
      memory: "512Mi"
    defaultRequest:
      cpu: "200m"
      memory: "256Mi"
    max:
      cpu: "500m"
      memory: "1Gi"